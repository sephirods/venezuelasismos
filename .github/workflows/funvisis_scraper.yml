name: FUNVISIS Scraper (via IONOS)

on:
  schedule:
    # Ejecutar cada 5 minutos como respaldo al cron de IONOS
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Permitir ejecución manual

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
    - name: Trigger IONOS scraper
      run: |
        echo "Disparando scraper en IONOS..."
        curl -sf --max-time 60 \
          "https://forjadigitales.com/sismos-cron.php?token=sismosve_cron_2024" \
          && echo "OK - Scraper ejecutado exitosamente" \
          || echo "WARN - El endpoint no respondio (el cron de WP puede haberlo ejecutado ya)"
