name: FUNVISIS Scraper

on:
  schedule:
    # Ejecutar cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Permitir ejecución manual

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'


    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run scraper
      run: python scraper/funvisis_scraper.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Verificar si hay cambios en el archivo JSON
        if git diff --quiet public/sismos_venezuela.json; then
          echo "No hay nuevos sismos detectados por FUNVISIS."
        else
          echo "Nuevos sismos detectados. Guardando y commiteando..."
          git add public/sismos_venezuela.json
          
          # También copiar al directorio web para mantenerlo sincronizado
          mkdir -p web
          cp public/sismos_venezuela.json web/sismos_venezuela.json
          git add web/sismos_venezuela.json
          
          git commit -m "Update FUNVISIS sismos database [skip ci]"
          git push origin main
        fi
